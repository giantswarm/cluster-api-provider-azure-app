name: Templates
on: pull_request
jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Generate templates
      run: make generate
    - name: Verify templates
      run: git diff --exit-code

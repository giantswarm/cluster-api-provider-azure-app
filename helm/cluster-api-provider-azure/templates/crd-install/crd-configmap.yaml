{{/*
We have to create individual configmaps for each CRD - they exceed the total
allowed length for a configmap if they are combined.
*/}}
{{ $currentScope := . }}
  {{- range $path, $_ := .Files.Glob "files/**.yaml" }}
    {{- with $currentScope }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "crd-install.name" . }}-{{ dir $path | base }}-{{ base $path | trimSuffix ".yaml" }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "crd-install.labels" . | nindent 4 }}
  annotations:
    # create hook dependencies in the right order
    "helm.sh/hook-weight": "-5"
    {{- include "crd-install.annotations" . | nindent 4 }}
data:
  content: |
{{ tpl ($.Files.Get $path) . | indent 4 }}
    {{- end }}
  {{- end }}

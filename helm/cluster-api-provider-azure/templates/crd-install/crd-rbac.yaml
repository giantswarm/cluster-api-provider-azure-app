apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "crd-install.name" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "crd-install.labels" . | nindent 4 }}
  annotations:
    # create hook dependencies in the right order
    "helm.sh/hook-weight": "-3"
    {{- include "crd-install.annotations" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - jobs
  verbs:
  - create
  - delete
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - delete
  - get
  - patch
{{- if .Capabilities.APIVersions.Has "policy/v1beta1/PodSecurityPolicy" }}
- apiGroups:
  - policy
  resources:
  - podsecuritypolicies
  resourceNames:
  - {{ include "crd-install.name" . }}
  verbs:
  - use
{{- end }}
- apiGroups:
  - apps
  - extensions
  resources:
  - deployments
  verbs:
  - get
  - patch
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "crd-install.name" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "crd-install.labels" . | nindent 4 }}
  annotations:
    # create hook dependencies in the right order
    "helm.sh/hook-weight": "-2"
    {{- include "crd-install.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "crd-install.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "crd-install.name" . }}
    namespace: {{ .Release.Namespace | quote }}
